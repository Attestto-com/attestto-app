<style>
:root {
  --bg-deep: #080e14;
  --bg-base: #0f1923;
  --bg-card: #1a1f2e;
  --bg-card-hover: #222838;
  --primary: #594FD3;
  --primary-glow: rgba(89, 79, 211, 0.25);
  --success: #4ade80;
  --success-dim: rgba(74, 222, 128, 0.15);
  --warning: #fbbf24;
  --warning-dim: rgba(251, 191, 36, 0.15);
  --build: #60a5fa;
  --build-dim: rgba(96, 165, 250, 0.15);
  --text: #e8eaed;
  --text-muted: #8b95a5;
  --text-dim: #5a6577;
  --border: rgba(255, 255, 255, 0.06);
  --radius: 12px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: var(--font);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* ── Back link ─────────────────────────────────── */

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-dim);
  text-decoration: none;
  margin-bottom: 32px;
  transition: color 0.2s;
}
.back-link:hover { color: var(--text-muted); }

/* ── Header ────────────────────────────────────── */

.mod-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 32px;
}

.mod-icon-wrap {
  width: 64px;
  height: 64px;
  background: var(--primary-glow);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.mod-icon-wrap .material-icons-outlined { font-size: 28px; color: var(--primary); }

.mod-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.mod-country { font-family: var(--mono); font-size: 12px; color: var(--text-dim); margin-top: 2px; }

.mod-status {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border-radius: 6px;
  margin-top: 8px;
}

.status-functional { color: var(--success); background: var(--success-dim); }
.status-progress { color: var(--warning); background: var(--warning-dim); }
.status-planned { color: var(--build); background: var(--build-dim); }

.progress-row {
  display: flex; align-items: center; gap: 10px; margin-top: 8px; max-width: 200px;
}
.progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #7c6ef0); border-radius: 2px; }
.progress-pct { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }

/* ── Sections ──────────────────────────────────── */

.mod-section {
  margin-bottom: 40px;
}

.mod-section-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.mod-desc {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 24px;
}

/* ── Flow steps ────────────────────────────────── */

.flow-steps {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.flow-step {
  display: flex;
  gap: 16px;
  padding: 16px 0;
}

.flow-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--primary-glow);
  color: var(--primary);
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.flow-content { flex: 1; }
.flow-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.flow-desc { font-size: 13px; color: var(--text-muted); }

.flow-connector {
  width: 2px;
  height: 16px;
  background: var(--border);
  margin-left: 15px;
}

/* ── Specs grid ────────────────────────────────── */

.specs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.spec-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.spec-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.spec-value { font-size: 14px; font-weight: 500; }

/* ── Compliance list ───────────────────────────── */

.compliance-list {
  list-style: none;
}

.compliance-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.compliance-ref {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  min-width: 36px;
}

.compliance-check {
  color: var(--success);
  font-size: 16px;
}

/* ── Screenshots ───────────────────────────────── */

.screenshots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.screenshot-slot {
  aspect-ratio: 9/16;
  background: var(--bg-card);
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 13px;
}

/* ── CTA ───────────────────────────────────────── */

.mod-cta {
  text-align: center;
  padding: 40px 0;
}

.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.2s;
}
.cta-btn:hover { opacity: 0.9; }

.cta-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  margin-left: 12px;
}

/* ── Coming soon ───────────────────────────────── */

.coming-soon {
  text-align: center;
  padding: 60px 0;
  color: var(--text-dim);
}

.coming-soon .material-icons-outlined { font-size: 48px; margin-bottom: 16px; display: block; }

/* ── Footer ────────────────────────────────────── */

.footer {
  text-align: center;
  padding: 40px 0;
  font-size: 13px;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
}
.footer a { color: var(--primary); text-decoration: none; }

@media (max-width: 768px) {
  .container { padding: 20px 16px; }
  .mod-header { flex-direction: column; }
  .specs-grid { grid-template-columns: 1fr 1fr; }
  .screenshots-grid { grid-template-columns: 1fr; }
}

  const statusLabel = mod.status === 'live' ? 'Funcional' : mod.status === 'progress' ? 'En progreso' : 'Planificado';


  let html = `
    <a href="/demo.html" class="back-link"><span class="material-icons-outlined" style="font-size:16px">arrow_back</span> Volver a modulos</a>

    <div class="mod-header">
      <div class="mod-icon-wrap"><span class="material-icons-outlined">${mod.icon}</span></div>
      <div>
        <div class="mod-title">${mod.name}</div>
        <div class="mod-country">${mod.country}</div>
        <span class="mod-status ${statusClass}">${statusLabel}</span>
        ${mod.progress ? `<div class="progress-row"><div class="progress-bar"><div class="progress-fill" style="width:${mod.progress}%"></div></div><span class="progress-pct">${mod.progress}%</span></div>` : ''}
      </div>
    </div>

    <p class="mod-desc">${mod.desc}</p>
  `;

  if (mod.status === 'planned' && !mod.problem) {
    html += `
      <div class="coming-soon">
        <span class="material-icons-outlined">construction</span>
        <h3>Proximamente</h3>
        <p style="margin-top:8px;color:var(--text-dim)">Este modulo esta en fase de diseno. Contactenos para mas informacion.</p>
        <br>
        <a href="mailto:eduardo@attestto.com" class="cta-btn cta-secondary">Contactar</a>
      </div>
    `;
  } else {
    // Problem
    if (mod.problem) {
      html += `
        <div class="mod-section">
          <div class="mod-section-title">El problema</div>
          <p class="mod-desc">${mod.problem}</p>
        </div>
      `;
    }

    // Flow
    if (mod.flow.length) {
      html += `<div class="mod-section"><div class="mod-section-title">Como funciona</div><div class="flow-steps">`;
      mod.flow.forEach((step, i) => {
        html += `
          <div class="flow-step">
            <div class="flow-num">${i + 1}</div>
            <div class="flow-content">
              <div class="flow-title">${step.title}</div>
              <div class="flow-desc">${step.desc}</div>
            </div>
          </div>
        `;
        if (i < mod.flow.length - 1) html += '<div class="flow-connector"></div>';
      });
      html += `</div></div>`;
    }

    // Specs
    if (mod.specs.length) {
      html += `<div class="mod-section"><div class="mod-section-title">Especificaciones tecnicas</div><div class="specs-grid">`;
      mod.specs.forEach(s => {
        html += `<div class="spec-card"><div class="spec-label">${s.label}</div><div class="spec-value">${s.value}</div></div>`;
      });
      html += `</div></div>`;
    }

    // Compliance
    if (mod.compliance.length) {
      html += `<div class="mod-section"><div class="mod-section-title">Cumplimiento (Pliego MOPT/DGEV)</div><ul class="compliance-list">`;
      mod.compliance.forEach(c => {
        html += `<li class="compliance-item"><span class="compliance-ref">${c.ref}</span><span class="material-icons-outlined compliance-check">check_circle</span>${c.desc}</li>`;
      });
      html += `</ul></div>`;
    }

    // Screenshots
    if (mod.screenshots > 0) {
      html += `<div class="mod-section"><div class="mod-section-title">Capturas</div><div class="screenshots-grid">`;
      for (let i = 0; i < mod.screenshots; i++) {
        html += `<div class="screenshot-slot">Captura ${i + 1}</div>`;
      }
      html += `</div></div>`;
    }
  }

  // Footer
  html += `
    <footer class="footer">
      Apache 2.0 &middot;
      <a href="https://attestto.com">attestto.com</a> &middot;
      <a href="https://attestto.org/ark/">attestto.org/ark</a>
    </footer>
  `;

  container.innerHTML = html;
}
</script>

</body>
</html>
