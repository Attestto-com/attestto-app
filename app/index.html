  <script type="application/ld+json">
  [
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Attestto",
      "url": "https://app.attestto.com",
      "description": "La app soberana. Identidad, credenciales verificables, exámenes proctorizados, firma digital, IA on-device y módulos extensibles — todo offline-first, sin servidores.",
      "applicationCategory": "SecurityApplication",
      "applicationSubCategory": "Sovereign Identity Platform",
      "operatingSystem": "Android, iOS, Desktop (PWA)",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "license": "https://www.apache.org/licenses/LICENSE-2.0",
      "softwareVersion": "0.2.0",
      "screenshot": "https://app.attestto.com/og-app.png",
      "creator": {
        "@type": "Organization",
        "name": "Attestto",
        "url": "https://attestto.org"
      },
      "featureList": [
        "Identidad soberana (DID + Ed25519)",
        "Credenciales verificables (W3C VC)",
        "Escaneo de cédula, licencia y pasaporte con OCR",
        "IA on-device (Gemma 2B, sin servidor)",
        "Exámenes proctorizados con competencia perpetua",
        "Passkeys (WebAuthn) + bóveda cifrada (AES-256-GCM)",
        "Offline-first / Local-first",
        "Trust store nacional (PKI por jurisdicción)"
      ]
    },
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es Attestto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Attestto es la app soberana — identidad, credenciales verificables, exámenes proctorizados, firma digital, IA on-device y módulos extensibles. Todo funciona offline en tu dispositivo, sin servidores ni intermediarios. Código abierto bajo Apache 2.0."
          }
        },
        {
          "@type": "Question",
          "name": "¿Mis datos salen de mi dispositivo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Attestto es offline-first y local-first. Tu clave privada Ed25519 se genera en tu dispositivo, se protege con WebAuthn (passkeys) y nunca se transmite. Las credenciales se almacenan en una bóveda cifrada con AES-256-GCM en tu navegador."
          }
        },
        {
          "@type": "Question",
          "name": "¿Attestto es gratis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Identidad, firma, verificación, anclaje y recuperación son gratuitos para siempre. Es infraestructura pública — el comercio financia la red para que los ciudadanos nunca paguen."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo instalo la app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Attestto es una Progressive Web App (PWA). Abre app.attestto.com en tu navegador móvil y selecciona 'Instalar' o 'Agregar a pantalla de inicio'. No necesitas app store. Funciona en Android, iOS y escritorio."
          }
        }
      ]
    }
  ]
