name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build module-sdk
        run: pnpm --filter @attestto/module-sdk build

      - name: Stub guard
        run: |
          PATTERNS=(
            "// *(TODO|FIXME|HACK|XXX|PLACEHOLDER|placeholder)"
            "did:(web|example):demo"
            "did:(web|example):medico|did:example:"
            "['\"]fake[_-]|['\"]dummy[_-]|['\"]sample[_-]"
            "alert\(['\"]"
            "coming.?soon|próximamente|proximamente"
            "not yet implemented|not implemented"
            "'00000'|\"00000\""
          )
          EXCLUDE="node_modules/\|/dist/\|__tests__/\|__mocks__/\|/demo/\|/scripts/\|/fixtures/\|\.test\.\|\.spec\.\|vitest\.\|modules/cr-medical/\|modules/agreement/"
          INCLUDE='\.ts:\|\.tsx:\|\.vue:\|\.js:\|\.mjs:'
          ALLOW='stub-guard-ignore\|i18n\.\|/i18n/\|/locales/\|@example\|/\*\*\|^ *\*'
          HITS=0
          for pat in "${PATTERNS[@]}"; do
            matches=$(grep -rEn -i "$pat" src app/src modules 2>/dev/null | grep "$INCLUDE" | grep -v "$EXCLUDE" | grep -v "$ALLOW" || true)
            if [ -n "$matches" ]; then
              echo "$matches"
              HITS=$((HITS + $(echo "$matches" | wc -l)))
            fi
          done
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Stub guard failed: $HITS stub(s) found"
            exit 1
          fi
          echo "Stub guard passed"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
